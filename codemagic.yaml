# Codemagic build config — Symmetry native shell (Capacitor).
# Manual-trigger only (no automatic build on push). Produces a DEBUG APK for
# device testing (login-persistence de-risk). Signing/release comes later.
workflows:
  android-debug:
    name: Symmetry Android (debug APK)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 20
      groups:
        # Codemagic app-level variable group holding GOOGLE_SERVICES_JSON (the
        # raw google-services.json). Only consumed by the gated push-wiring step.
        - push
    scripts:
      - name: Install web dependencies
        script: npm install
      - name: Add Capacitor (build tooling only)
        script: npm install @capacitor/core@^6 @capacitor/cli@^6 @capacitor/android@^6 @capacitor/app@^6 @capacitor-community/speech-recognition@^6
      - name: Generate Android project
        script: npx cap add android || npx cap sync android
      - name: Sync Capacitor into Android
        script: npx cap sync android
      - name: Wire Firebase push (only when GOOGLE_SERVICES_JSON is set)
        script: |
          # FULLY GATED: with no GOOGLE_SERVICES_JSON secure var, this is a no-op
          # and the build is byte-for-byte identical to the pre-push build. When
          # the var is present (base64 of google-services.json), we pull in the
          # push plugin + Google Services gradle plugin so FCM works.
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "GOOGLE_SERVICES_JSON not set — skipping push wiring (push stays inert)."
            exit 0
          fi
          echo "GOOGLE_SERVICES_JSON present — wiring Firebase push."
          npm install @capacitor/push-notifications@^6
          npx cap sync android
          # Accept the raw google-services.json content (paste the file as-is into
          # the Codemagic var). printf '%s' preserves it verbatim, no base64 needed.
          printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          python3 - << 'EOF'
          import re
          # Root build.gradle: add the google-services classpath.
          rb = "android/build.gradle"
          s = open(rb).read()
          if "com.google.gms:google-services" not in s:
              s = re.sub(r'(dependencies\s*\{)',
                         r"\1\n        classpath 'com.google.gms:google-services:4.4.2'",
                         s, count=1)
              open(rb, "w").write(s)
          # App build.gradle: apply the google-services plugin (needs the json above).
          ab = "android/app/build.gradle"
          s = open(ab).read()
          if "com.google.gms.google-services" not in s:
              s = s.rstrip() + "\napply plugin: 'com.google.gms.google-services'\n"
              open(ab, "w").write(s)
          # Manifest: Android 13+ runtime notification permission.
          mp = "android/app/src/main/AndroidManifest.xml"
          s = open(mp).read()
          if "POST_NOTIFICATIONS" not in s:
              s = s.replace("<application",
                            '<uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n    <application',
                            1)
              open(mp, "w").write(s)
          print("push wired: google-services.json + gradle plugin + POST_NOTIFICATIONS")
          EOF
      - name: Disable Android predictive back (hardware Back must reach the WebView)
        script: |
          python3 - << 'EOF'
          import re
          p = "android/app/src/main/AndroidManifest.xml"
          s = open(p).read()
          if "enableOnBackInvokedCallback" in s:
              s = re.sub(r'android:enableOnBackInvokedCallback="[^"]*"', 'android:enableOnBackInvokedCallback="false"', s)
          else:
              s = s.replace("<application", '<application android:enableOnBackInvokedCallback="false"', 1)
          if "android.permission.RECORD_AUDIO" not in s:
              s = s.replace("<application", '<uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <application', 1)
          if "android.speech.RecognitionService" not in s:
              s = s.replace("<application", '<queries><intent><action android:name="android.speech.RecognitionService" /></intent></queries>\n    <application', 1)
          open(p, "w").write(s)
          print("manifest patched: predictive back disabled + mic permission + speech service query")
          EOF
      - name: Generate app icon and splash
        script: |
          python3 -m pip install --quiet --user pillow numpy || pip3 install --quiet pillow numpy
          python3 resources/generate_icons.py
          npx @capacitor/assets@3.0.5 generate --android
      - name: Build debug APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/**/*.apk
      - assets/icon-only.png
    publishing:
      email:
        recipients:
          - symmetrypersonaltraining@gmail.com
        notify:
          success: true
          failure: true
