# Codemagic build config — Symmetry native shell (Capacitor).
# Manual-trigger only (no automatic build on push). Produces a DEBUG APK for
# device testing (login-persistence de-risk). Signing/release comes later.
workflows:
  android-debug:
    name: Symmetry Android (debug APK)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 20
    scripts:
      - name: Install web dependencies
        script: npm install
      - name: Add Capacitor (build tooling only)
        script: npm install @capacitor/core@^6 @capacitor/cli@^6 @capacitor/android@^6 @capacitor/app@^6
      - name: Generate Android project
        script: npx cap add android || npx cap sync android
      - name: Sync Capacitor into Android
        script: npx cap sync android
      - name: Disable Android predictive back (hardware Back must reach the WebView)
        script: |
          python3 - << 'EOF'
          import re
          p = "android/app/src/main/AndroidManifest.xml"
          s = open(p).read()
          if "enableOnBackInvokedCallback" in s:
              s = re.sub(r'android:enableOnBackInvokedCallback="[^"]*"', 'android:enableOnBackInvokedCallback="false"', s)
          else:
              s = s.replace("<application", '<application android:enableOnBackInvokedCallback="false"', 1)
          open(p, "w").write(s)
          print("manifest patched: predictive back disabled")
          EOF
      - name: Generate app icon and splash
        script: |
          python3 -m pip install --quiet --user pillow numpy || pip3 install --quiet pillow numpy
          python3 resources/generate_icons.py
          npx @capacitor/assets@3.0.5 generate --android
      - name: Build debug APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/**/*.apk
      - assets/icon-only.png
    publishing:
      email:
        recipients:
          - symmetrypersonaltraining@gmail.com
        notify:
          success: true
          failure: true
