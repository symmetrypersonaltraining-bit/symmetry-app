<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Symmetry</title>
    <style>
      html,body{height:100%;margin:0;background:#0F4C81;color:#fff;
        font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
      .wrap{height:100%;display:flex;flex-direction:column;align-items:center;
        justify-content:center;gap:14px;text-align:center;padding:24px}
      .dot{width:10px;height:10px;border-radius:50%;background:#fff;opacity:.6;
        animation:p 1s infinite ease-in-out}
      @keyframes p{0%,100%{opacity:.25}50%{opacity:1}}
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1 style="font-weight:600;letter-spacing:.5px;margin:0">Symmetry</h1>
      <div class="dot"></div>
      <p style="opacity:.7;font-size:14px;margin:0">Connecting…</p>
    </div>
  </body>
</html>
