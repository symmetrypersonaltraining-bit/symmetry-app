name: GCal 15-min Sync
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
jobs:
  gcal-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger GCal sync
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -X GET https://symmetry-app-omega.vercel.app/api/gcal-sync)
          cat /tmp/response.txt
          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "204" ]; then
            echo "GCal sync OK"
          else exit 1; fi
